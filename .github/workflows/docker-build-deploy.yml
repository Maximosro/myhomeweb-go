name: Deploy to Hostinger KVM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to VPS via Hostinger API
        env:
          HOSTINGER_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          # Retry wrapper — Hostinger API sometimes returns Cloudflare 530
          deploy_api() {
            curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${HOSTINGER_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.hostinger.com/api/vps/v1/virtual-machines/1158554/projects/root/update"
          }

          for attempt in $(seq 1 5); do
            echo "Deploy attempt $attempt/5..."
            HTTP_CODE=$(deploy_api)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "Deploy triggered — HTTP $HTTP_CODE"
              break
            fi
            echo "Hostinger API returned HTTP $HTTP_CODE (attempt $attempt)"
            cat /tmp/deploy-response.json 2>/dev/null || true
            if [ "$attempt" -eq 5 ]; then
              echo "Deploy FAILED after 5 attempts"
              exit 1
            fi
            echo "Retrying in 10s..."
            sleep 10
          done

          cat /tmp/deploy-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/deploy-response.json

          # Poll until deploy completes (max 90s)
          ACTION_ID=$(cat /tmp/deploy-response.json | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")
          if [ -n "$ACTION_ID" ]; then
            for i in $(seq 1 18); do
              sleep 5
              STATE=$(curl -sf \
                -H "Authorization: Bearer ${HOSTINGER_TOKEN}" \
                "https://api.hostinger.com/api/vps/v1/virtual-machines/1158554/actions/${ACTION_ID}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('state',''))" 2>/dev/null || echo "polling")
              echo "Deploy state: $STATE (${i}x5s)"
              if [ "$STATE" = "success" ]; then
                echo "Deploy completed successfully"
                break
              elif [ "$STATE" = "failed" ]; then
                echo "Deploy FAILED"
                exit 1
              fi
            done
          fi

      - name: Smoke test
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 8); do
            HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" https://home.srv1158554.hstgr.cloud/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed (HTTP $HTTP_CODE) after ${i}x5s"
              exit 0
            fi
            echo "Attempt $i/8: HTTP $HTTP_CODE — waiting..."
            sleep 5
          done
          echo "Smoke test failed after 40s"
          exit 1

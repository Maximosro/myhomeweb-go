name: Deploy to Hostinger KVM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to VPS via SSH
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in $(seq 1 3); do
            echo "SSH attempt $i/3..."
            if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=10 -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" "cd /root && docker compose pull myhomeweb && docker compose up -d myhomeweb && docker compose ps myhomeweb"; then
              echo "SSH deploy OK (attempt $i)"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "SSH deploy FAILED after 3 attempts"
              exit 1
            fi
            echo "Retrying in 10s..."
            sleep 10
          done

      - name: Smoke test
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 8); do
            HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" https://home.srv1158554.hstgr.cloud/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed (HTTP $HTTP_CODE) after ${i}x5s"
              exit 0
            fi
            echo "Attempt $i/8: HTTP $HTTP_CODE — waiting..."
            sleep 5
          done
          echo "Smoke test failed after 40s"
          exit 1
